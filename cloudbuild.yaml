steps:
# 1. Build Connector
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/gke-repo/connector:$SHORT_SHA', './connector']
  id: 'Build Connector'

# 2. Build Frontend
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/gke-repo/frontend:$SHORT_SHA', './frontend']
  id: 'Build Frontend'

# 3. Push Images
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/gke-repo/connector:$SHORT_SHA']
  waitFor: ['Build Connector']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/gke-repo/frontend:$SHORT_SHA']
  waitFor: ['Build Frontend']

# 4. Create Cloud Deploy release → auto deploys to dev
- name: 'google/cloud-sdk:latest'
  entrypoint: 'sh'
  args:
  - -xe
  - -c
  - |
    git clone https://github.com/alik15/cloud-computing-project-infra.git infra
    gcloud deploy releases create rel-$SHORT_SHA \
      --delivery-pipeline=gke-cicd-pipeline \
      --region=us-central1 \
      --skaffold-file=skaffold.yaml \
      --images=connector=us-central1-docker.pkg.dev/$PROJECT_ID/gke-repo/connector:$SHORT_SHA,frontend=us-central1-docker.pkg.dev/$PROJECT_ID/gke-repo/frontend:$SHORT_SHA
  waitFor: ['Build Connector', 'Build Frontend']

options:
  logging: CLOUD_LOGGING_ONLY
