<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reelkeeper — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #12121a;
      --card:    #1a1a26;
      --border:  #2a2a3d;
      --accent:  #e8b86d;
      --text:    #e8e6e0;
      --muted:   #6b6880;
      --error:   #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    .login-box {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem 2.5rem;
      width: min(420px, 95vw);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--accent);
      text-align: center;
      margin-bottom: 0.3rem;
    }
    .logo span { font-style: italic; color: var(--text); }

    .tagline {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .error-msg {
      background: rgba(192,57,43,0.15);
      border: 1px solid var(--error);
      color: #fc8181;
      font-size: 0.82rem;
      padding: 0.65rem 1rem;
      border-radius: 4px;
      margin-bottom: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.7rem 1rem;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: var(--accent); }

    button {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem;
      border-radius: 4px;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">Reel<span>keeper</span></div>
    <p class="tagline">Your personal movie journal</p>

    {% if form.errors %}
    <div class="error-msg">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}"/>

      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" id="id_username" name="username"
               autocomplete="username" autofocus/>
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" id="id_password" name="password"
               autocomplete="current-password"/>
      </div>

      <button type="submit">Sign In</button>
    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--muted)">
      No account? <a href="/register" style="color:var(--accent);text-decoration:none">Create one</a>
    </p>
    </form>
  </div>
</body>
</html>
