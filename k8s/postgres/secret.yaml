# Values are base64-encoded.
# To encode:  echo -n 'yourvalue' | base64
# To decode:  echo 'encoded' | base64 -d
#
# Defaults encoded here:
#   POSTGRES_DB       = appdb
#   POSTGRES_USER     = appuser
#   POSTGRES_PASSWORD = apppassword
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: appns
type: Opaque
data:
  POSTGRES_DB: YXBwZGI=
  POSTGRES_USER: YXBwdXNlcg==
  POSTGRES_PASSWORD: YXBwcGFzc3dvcmQ=
